<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supriya-তোমার জন্য জাদুর আকাশ ✨</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw; height: 100vh;
      background: radial-gradient(ellipse at bottom, #0b0826 0%, #03010a 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Georgia', 'Times New Roman', serif;
      overflow: hidden; user-select: none;
    }

    /* চলমান তারা-পরী Canvas */
    #magicCanvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }

    /* কেন্দ্রীয় স্টেজ */
    .stage-wrapper {
      position: relative; z-index: 20;
      width: 90%; max-width: 550px;
      display: flex; flex-direction: column; align-items: center;
    }

    .stage-box {
      position: relative;
      width: 100%;
      background: rgba(255, 240, 250, 0.08);
      backdrop-filter: blur(18px);
      border-radius: 40px;
      border: 1px solid rgba(255, 220, 240, 0.3);
      box-shadow: 0 0 40px rgba(180, 130, 255, 0.5);
      padding: 30px 25px;
      text-align: center;
      color: #fff0f5;
      min-height: 250px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 15px;
      transition: opacity 0.5s ease;
    }

    /* কোণার বড় পরী */
    .corner-fairy {
      position: absolute;
      font-size: 3.8rem;
      filter: drop-shadow(0 0 18px #ff99cc);
      pointer-events: none;
      z-index: 25;
      animation: floatFairy 2.5s ease-in-out infinite;
    }
    @keyframes floatFairy {
      0%,100% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(0, -12px) rotate(3deg); }
    }
    .corner-fairy.top-left    { top: -25px; left: -25px; }
    .corner-fairy.top-right   { top: -25px; right: -25px; }
    .corner-fairy.bottom-left { bottom: -25px; left: -25px; }
    .corner-fairy.bottom-right{ bottom: -25px; right: -25px; }

    /* ইনপুট, বাটন */
    .stage-box input {
      width: 220px; padding: 12px 18px; border-radius: 50px;
      border: none; outline: none; font-size: 1rem; text-align: center;
      background: rgba(255,255,255,0.85); box-shadow: 0 0 15px #ffb3c6;
    }
    .stage-box button {
      padding: 10px 32px; border-radius: 50px; border: none;
      background: linear-gradient(135deg, #ff4d6d, #b71c4a);
      color: white; font-weight: bold; font-size: 1rem;
      cursor: pointer; box-shadow: 0 0 20px #ff4d6d;
      transition: 0.2s;
    }
    .stage-box button:hover { transform: scale(1.05); box-shadow: 0 0 35px #ff4d6d; }
    .error-msg { color: #ffb3c1; font-size: 0.9rem; display: none; }

    /* বোল্ড টেক্সট */
    .big-bold {
      font-size: 1.5rem; font-weight: bold;
      text-shadow: 0 0 12px #ff99cc;
      line-height: 1.4;
    }

    /* জাদুর লোডিং (স্টেপ ৪) */
    .magic-loading {
      display: flex; flex-direction: column; align-items: center; gap: 25px;
    }
    .spinner {
      width: 60px; height: 60px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top: 4px solid #ff4d6d;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      box-shadow: 0 0 25px #ff4d6d;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .magic-loading p {
      font-size: 1.4rem;
      animation: glowPulse 1.5s infinite alternate;
    }
    @keyframes glowPulse {
      0% { text-shadow: 0 0 10px #ffb3c1; }
      100% { text-shadow: 0 0 30px #ff4d6d, 0 0 60px #ff99cc; }
    }

    /* PDF মোডাল */
    .pdf-modal {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      width: 85%; max-width: 700px; height: 80vh;
      background: white; border-radius: 28px;
      box-shadow: 0 0 80px rgba(255,215,0,0.9);
      z-index: 200; display: flex; flex-direction: column; overflow: hidden;
      transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .pdf-modal.show { transform: translate(-50%, -50%) scale(1); }
    .pdf-modal .pdf-header {
      background: linear-gradient(135deg, #c9184a, #5f0a2a);
      color: white; padding: 12px 20px;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 1.1rem;
    }
    .pdf-modal .pdf-header a {
      color: white; background: #ff4d6d;
      padding: 6px 18px; border-radius: 30px;
      text-decoration: none; font-weight: bold;
    }
    .pdf-modal iframe { flex: 1; border: none; }
  </style>
</head>

        y: Math.random() * height,
        size: Math.random() * 18 + 18,
        text: FAIRY_EMOJIS[Math.floor(Math.random() * FAIRY_EMOJIS.length)],
        speedX: (Math.random() - 0.5) * 0.7,
        speedY: (Math.random() - 0.5) * 0.7,
        angle: Math.random() * 360,
        rotSpeed: (Math.random() - 0.5) * 1.5,
        glow: Math.random() * 0.5 + 0.5,
      });
    }

    function drawMagic() {
      ctx.clearRect(0, 0, width, height);

      // তারা
      for (let s of stars) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        const flicker = 0.5 + 0.5 * Math.sin(s.twinkle + Date.now() * 0.003);
        ctx.fillStyle = `rgba(255, 255, 245, ${s.opacity * flicker})`;
        ctx.shadowColor = "#ffffff";
        ctx.shadowBlur = 5;
        ctx.fill();
        ctx.shadowBlur = 0;

        s.x += s.speedX;
        s.y += s.speedY;
        if (s.x < 0) s.x = width;
        if (s.x > width) s.x = 0;
        if (s.y < 0) s.y = height;
        if (s.y > height) s.y = 0;
      }

      // উল্কা
      createShootingStar();
      for (let i = shootingStars.length-1; i >= 0; i--) {
        let ss = shootingStars[i];
        ctx.beginPath();
        ctx.moveTo(ss.x, ss.y);
        let dx = Math.cos(ss.angle) * ss.len;
        let dy = Math.sin(ss.angle) * ss.len;
        ctx.lineTo(ss.x + dx, ss.y + dy);
        ctx.strokeStyle = `rgba(255, 255, 255, ${ss.life})`;
        ctx.lineWidth = 1.5;
        ctx.shadowBlur = 12;
        ctx.shadowColor = "white";
        ctx.stroke();
        ctx.shadowBlur = 0;
        ss.x += Math.cos(ss.angle) * ss.speed;
        ss.y += Math.sin(ss.angle) * ss.speed;
        ss.life -= 0.02;
        if (ss.life <= 0 || ss.x > width+100 || ss.y > height+100) shootingStars.splice(i,1);
      }

      // পরীরা (glow সহ)
      for (let f of fairies) {
        ctx.save();
        ctx.translate(f.x, f.y);
        ctx.rotate((f.angle * Math.PI) / 180);
        ctx.font = `${f.size}px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.shadowColor = `rgba(255, 180, 220, ${f.glow})`;
        ctx.shadowBlur = 20;
        ctx.fillText(f.text, 0, 0);
        ctx.shadowBlur = 0;
        ctx.restore();

        f.x += f.speedX;
        f.y += f.speedY;
        f.angle += f.rotSpeed;
        if (f.x < -40) f.x = width + 40;
        if (f.x > width + 40) f.x = -40;
        if (f.y < -40) f.y = height + 40;
        if (f.y > height + 40) f.y = -40;
      }

      requestAnimationFrame(drawMagic);
    }
    drawMagic();

    // ---------- স্টেজ ও ধাপ ----------
    const stageBox = document.getElementById("stageBox");
    const fairyTL = document.getElementById("fairyTL");
    const fairyTR = document.getElementById("fairyTR");
    const fairyBL = document.getElementById("fairyBL");
    const fairyBR = document.getElementById("fairyBR");
    const pdfModal = document.getElementById("pdfModal");
    const pdfViewer = document.getElementById("pdfViewer");
    const downloadPdf = document.getElementById("downloadPdf");

    let currentStep = 0;

    function setFairyCount(count) {
      fairyTL.style.display = count >= 2 ? "block" : "none";
      fairyTR.style.display = count >= 2 ? "block" : "none";
      fairyBL.style.display = count === 4 ? "block" : "none";
      fairyBR.style.display = count === 4 ? "block" : "none";
    }

    function renderStep(step) {
      stageBox.style.opacity = "0";
      setTimeout(() => {
        let html = "";
        switch(step) {
          case 0:
            setFairyCount(4);
            html = `
              <label style="font-size:1.3rem; text-shadow:0 0 10px #ff4d6d;">তোমার নাম লেখো</label>
              <input type="text" id="nameInput" placeholder="রূপকথার রাজকুমারী" autocomplete="off">
              <p class="error-msg" id="errorMsg">এই নাম তো রূপকথায় লেখা নেই…</p>
              <button id="step0Btn">জাদু শুরু করো</button>
            `;
            break;
          case 1:
            setFairyCount(2);
            html = `
              <p style="font-size:1.1rem;">তুমি কি এই প্রশ্নটার উত্তর শুভকে দেবে??</p>
              <p style="font-size:0.95rem; color:#ddd;">ও তোমাকে রিকোয়েস্ট করেছে এই প্রশ্নটার উত্তর দেওয়ার জন্য যেহেতু তুমি খুবই আল্ট্রা স্মার্ট, বেজেল লেস।</p>
              <p class="big-bold">“কি করে সৎ হতে হয় ??”</p>
              <button id="step1Btn">Hm</button>
              <p style="font-size:0.85rem; margin-top:5px;">ওকে চিন্তা করতে বারণ করো।</p>
            `;
            break;
          case 2:
            setFairyCount(2);
            html = `
              <p style="font-size:1.1rem;">তাহলে তুমি WhatsApp এ ওকে অব্যশই জানিয়ে দেবে তো??</p>
              <button id="step2Btn">Hm অব্যশই জানিয়ে দেবো</button>
            `;
            break;
          case 3:
            setFairyCount(2);
            html = `
              <p style="font-size:1.1rem;">তুমি কিন্তু শুভকে পাটি গণিতের পিডিএফ টা অব্যশই দেবে</p>
              <p style="color:#ffb3c1;">দেবে তো রাজকুমারী??</p>
              <button id="step3Btn">Hm দেবো</button>
            `;
            break;
          case 4:
            setFairyCount(2);
            html = `
              <p style="font-size:1.3rem;">🎁 এই নাও তোমাকে দেওয়া গিফট তুমি এটা আনলক করো 🎁</p>
              <button id="step4Btn">আনলক করো রাজকুমারী</button>
            `;
            break;
          default: break;
        }
        stageBox.innerHTML = html;
        stageBox.style.opacity = "1";

        // ইভেন্ট লিসেনার
        if (step === 0) {
          document.getElementById("step0Btn").addEventListener("click", () => {
            const name = document.getElementById("nameInput").value.trim();
            const err = document.getElementById("errorMsg");
            if (name.toLowerCase() === correctName.toLowerCase()) {
              currentStep = 1;
              renderStep(currentStep);
            } else {
              err.style.display = "block";
              setTimeout(() => { err.style.display = "none"; }, 2500);
            }
          });
          document.getElementById("nameInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") document.getElementById("step0Btn").click();
          });
        } else if (step === 1) {
          document.getElementById("step1Btn").addEventListener("click", () => {
            currentStep = 2; renderStep(currentStep);
          });
        } else if (step === 2) {
          document.getElementById("step2Btn").addEventListener("click", () => {
            currentStep = 3; renderStep(currentStep);
          });
        } else if (step === 3) {
          document.getElementById("step3Btn").addEventListener("click", () => {
            currentStep = 4; renderStep(currentStep);
          });
        } else if (step === 4) {
          document.getElementById("step4Btn").addEventListener("click", () => {
            // জাদুর লোডিং দেখাও ৩ সেকেন্ড
            stageBox.innerHTML = `
              <div class="magic-loading">
                <div class="spinner"></div>
                <p>✨ জাদু হচ্ছে... ✨</p>
              </div>
            `;
            setTimeout(() => {
              const pdfUri = "data:application/pdf;base64," + pdfBase64;
              pdfViewer.src = pdfUri;
              downloadPdf.href = pdfUri;
              pdfModal.classList.add("show");
              pdfModal.onclick = function(e) {
                if (e.target === pdfModal) pdfModal.classList.remove("show");
              };
            }, 3000);
          });
        }
      }, 250);
    }

    renderStep(0);
  </script>
</body>
</html>
